<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__PAGE_TITLE__</title>
  <link rel="icon" type="image/png" href="openurb.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']]
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <style>
    :root {
      --bg: radial-gradient(circle at 20% 20%, #f5f7ff, #e7ecff 25%, #f8f9ff 60%, #fefefe);
      --panel: #ffffffee;
      --muted: #6b7280;
      --accent: #3655ff;
      --accent-2: #00c6ae;
      --border: #e5e7eb;
      --shadow: 0 20px 60px rgba(45, 57, 105, 0.15);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: #0f172a;
      min-height: 100vh;
      padding: 32px 24px 64px;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 20px;
    }
    .hero {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
    }
    .hero img {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      background: white;
      padding: 6px;
      object-fit: contain;
    }
    .hero p {
      margin: 0;
      color: #111827;
      line-height: 1.45;
    }
    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .tab {
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 12px;
      background: #f8f9ff;
      color: #1f2937;
      cursor: pointer;
      transition: all 0.15s ease;
      font-weight: 600;
    }
    .tab.active {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: white;
      border-color: transparent;
      box-shadow: 0 12px 30px rgba(54, 85, 255, 0.2);
    }
    .tab.active:hover {
      background: linear-gradient(120deg, #4b6bff, #10d1ba);
    }
    .tab:not(.active):hover {
      background: #eef2ff;
    }
    .tab:hover {
      transform: translateY(-1px);
    }
    .tab small {
      display: block;
      font-size: 12px;
      color: inherit;
      opacity: 0.9;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      min-width: 960px;
    }
    thead th {
      text-align: left;
      font-size: 13px;
      color: #0b1224;
      border-bottom: 1px solid var(--border);
      padding: 10px 10px;
      position: sticky;
      top: 0;
      background: #fefefe;
      cursor: pointer;
      user-select: none;
    }
    .metric-header {
      cursor: help;
      text-decoration: underline dotted rgba(53, 76, 140, 0.5);
      text-underline-offset: 4px;
    }
    .metric-tooltip {
      position: fixed;
      z-index: 60;
      max-width: 320px;
      background: #0f172a;
      color: #f8fafc;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.35;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.3);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.12s ease, transform 0.12s ease;
      pointer-events: none;
    }
    .metric-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }
    tbody td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: #111827;
      background: #ffffff;
    }
    tbody tr:hover td {
      background: #f6f8ff;
    }
    tbody tr.row-selected td {
      background: #eaf0ff;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #312e81;
      font-weight: 600;
      font-size: 12px;
      border: 1px solid #d7ddff;
    }
    .empty {
      color: var(--muted);
      padding: 12px 0;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e7eaf7;
      color: var(--muted);
      font-size: 13px;
    }
    .controls-right {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filters-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .filters-title {
      font-size: 15px;
      font-weight: 600;
      color: #0f172a;
    }
    .filters-hint {
      font-size: 12px;
      color: var(--muted);
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .filter-group {
      background: #f8f9ff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    .filter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .filter-label {
      font-size: 13px;
      font-weight: 600;
      color: #0f172a;
    }
    .filter-actions {
      display: inline-flex;
      gap: 6px;
    }
    .filter-action {
      border: 1px solid #e2e8f0;
      background: #ffffff;
      color: #475569;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      cursor: pointer;
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    .filter-action:hover {
      border-color: #c7d2fe;
      color: #1f2937;
      background: #eef2ff;
    }
    .filter-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .filter-option {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #e2e8f0;
      background: #ffffff;
      color: #1f2937;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }
    .filter-option input {
      margin: 0;
      accent-color: var(--accent);
    }
    .hint {
      color: var(--muted);
      font-size: 11px;
      opacity: 0.7;
    }
    .hint-footer {
      text-align: center;
      margin-top: 18px;
    }
    .download-btn,
    .action-btn {
      border: 1px solid var(--border);
      background: #ffffff;
      color: #1f2937;
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
    }
    .download-btn:hover,
    .action-btn:hover {
      transform: translateY(-1px);
      border-color: #c7d2fe;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
      background: #f3f4ff;
    }
    .download-btn:active,
    .action-btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.1);
    }
    .sort-indicator {
      margin-left: 6px;
      font-size: 11px;
      opacity: 0.7;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    a:hover {
      text-decoration: underline;
    }
    .title-link {
      color: inherit;
    }
    .fold-star {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 7px;
      margin-left: 6px;
      border-radius: 999px;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      color: #3730a3;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      vertical-align: middle;
    }
    .exp-cell {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .metric-best {
      font-weight: 700;
      color: #0f172a;
    }
    .preview-card {
      position: fixed;
      z-index: 50;
      width: 540px;
      max-width: 55vw;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 24px 50px rgba(15, 23, 42, 0.2);
      padding: 12px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.12s ease, transform 0.12s ease;
    }
    .preview-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .preview-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .preview-img {
      width: 100%;
      height: auto;
      max-height: 360px;
      object-fit: contain;
      border-radius: 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }
    .preview-fallback {
      display: none;
      font-size: 12px;
      color: var(--muted);
      padding: 18px;
      text-align: center;
      border-radius: 10px;
      border: 1px dashed #cbd5f5;
      background: #f8faff;
    }
    .preview-card.missing .preview-img {
      display: none;
    }
    .preview-card.missing .preview-fallback {
      display: block;
    }
    .compare-panel {
      display: none;
      margin-top: 16px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #f8f9ff;
    }
    .compare-panel.visible {
      display: block;
    }
    .compare-panel.single .compare-img-right,
    .compare-panel.single .compare-divider,
    .compare-panel.single .compare-slider,
    .compare-panel.single .compare-right {
      display: none;
    }
    .compare-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .compare-title {
      font-size: 13px;
      font-weight: 600;
      color: #0f172a;
    }
    .compare-labels {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .compare-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #475569;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      padding: 4px 8px;
      border-radius: 999px;
    }
    .compare-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .compare-left-dot {
      background: var(--accent);
    }
    .compare-right-dot {
      background: var(--accent-2);
    }
    .compare-frame {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #ffffff;
      --compare-position: 50%;
    }
    .compare-img {
      width: 100%;
      height: auto;
      max-height: 360px;
      object-fit: contain;
      display: block;
    }
    .compare-img-right {
      position: absolute;
      inset: 0;
      height: 100%;
      width: 100%;
      clip-path: inset(0 0 0 var(--compare-position));
    }
    .compare-divider {
      position: absolute;
      top: 0;
      bottom: 0;
      left: var(--compare-position);
      width: 2px;
      background: rgba(54, 85, 255, 0.7);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.6);
    }
    .compare-slider {
      position: absolute;
      inset: 0;
      width: 100%;
      opacity: 0;
      cursor: col-resize;
    }
    .compare-header-cell {
      width: 60px;
      cursor: default;
    }
    .compare-checkbox {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    @media (max-width: 720px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      .title {
        font-size: 26px;
      }
      thead th, tbody td {
        font-size: 12px;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <h1 class="title"><a class="title-link" href="__TITLE_LINK_URL__" target="_blank" rel="noopener">__TITLE_LINK_TEXT__</a> __TITLE_SUFFIX__</h1>
        <div class="meta">__META_TEXT__</div>
      </div>
      <div class="pill" id="stats-pill">__STATS_LOADING__</div>
    </header>

    <div class="card hero">
      <img src="openurb.png" alt="__LOGO_ALT__">
      <p>__HERO_TEXT__</p>
    </div>

    <div class="card">
      <div class="controls">
        <div class="controls-right">
          <div id="combo-count"></div>
          <button class="action-btn" id="isolate-btn">__ISOLATE_LABEL__</button>
          <button class="action-btn" id="fold-toggle-btn">__COLLAPSE_FOLDS_LABEL__</button>
          <button class="action-btn" id="deselect-btn">__DESELECT_LABEL__</button>
          <button class="download-btn action-btn" id="download-csv">__DOWNLOAD_LABEL__</button>
        </div>
      </div>
      <div class="filters-header">
        <div>
          <div class="filters-title">__FILTERS_TITLE__</div>
          <div class="filters-hint">__FILTERS_HINT__</div>
        </div>
      </div>
      <div class="filters" id="filters"></div>
      <div id="table-container"></div>
      <div class="compare-panel" id="compare-panel" aria-hidden="true">
        <div class="compare-header">
          <div class="compare-title">__COMPARE_TITLE__</div>
          <div class="compare-labels">
            <div class="compare-label">
              <span class="compare-dot compare-left-dot"></span>
              <span id="compare-left-label"></span>
            </div>
            <div class="compare-label compare-right">
              <span class="compare-dot compare-right-dot"></span>
              <span id="compare-right-label"></span>
            </div>
          </div>
        </div>
        <div class="compare-frame" id="compare-frame">
          <img class="compare-img" id="compare-img-left" alt="">
          <img class="compare-img compare-img-right" id="compare-img-right" alt="">
          <div class="compare-divider" id="compare-divider"></div>
          <input type="range" min="0" max="100" value="50" class="compare-slider" id="compare-slider" aria-label="__COMPARE_SLIDER_LABEL__">
        </div>
      </div>
    </div>
  </div>
  <div class="hint hint-footer">__FOOTER_HINT____FOOTER_SEPARATOR____GENERATED_LABEL__ __GENERATED_AT__</div>

  <div class="preview-card" id="preview-card">
    <div class="preview-title" id="preview-title">__PREVIEW_TITLE__</div>
    <img class="preview-img" id="preview-img" alt="__PREVIEW_ALT__">
    <div class="preview-fallback" id="preview-fallback">__PREVIEW_FALLBACK__</div>
  </div>
  <div class="metric-tooltip" id="metric-tooltip"></div>

  <script>
    const leaderboardData = __DATA__;
    const strings = leaderboardData.strings || {};

    const filtersEl = document.getElementById('filters');
    const tableContainer = document.getElementById('table-container');
    const comboCountEl = document.getElementById('combo-count');
    const statsPill = document.getElementById('stats-pill');
    const downloadBtn = document.getElementById('download-csv');
    const isolateBtn = document.getElementById('isolate-btn');
    const deselectBtn = document.getElementById('deselect-btn');
    const foldToggleBtn = document.getElementById('fold-toggle-btn');
    const previewCard = document.getElementById('preview-card');
    const previewTitle = document.getElementById('preview-title');
    const previewImg = document.getElementById('preview-img');
    const previewFallback = document.getElementById('preview-fallback');
    const metricTooltip = document.getElementById('metric-tooltip');
    const comparePanel = document.getElementById('compare-panel');
    const compareLeftLabel = document.getElementById('compare-left-label');
    const compareRightLabel = document.getElementById('compare-right-label');
    const compareImgLeft = document.getElementById('compare-img-left');
    const compareImgRight = document.getElementById('compare-img-right');
    const compareDivider = document.getElementById('compare-divider');
    const compareSlider = document.getElementById('compare-slider');
    const compareFrame = document.getElementById('compare-frame');
    const isFileProtocol = window.location.protocol === 'file:';

    const metricDescriptions = strings.metric_descriptions || {};
    const typeLabels = strings.type_labels || {};
    const headerLabels = strings.table_headers || {};
    const unknownEnv = strings.unknown_env || '';
    const unknownTask = strings.unknown_task || '';
    const unknownNetwork = strings.unknown_network || '';
    const naLabel = strings.na_label || '';
    const previewPath = strings.preview_image_path || '';
    const compareColumnLabel = strings.compare_column_label || '';
    const compareLabelLeftTemplate = strings.compare_label_left || '';
    const compareLabelRightTemplate = strings.compare_label_right || '';
    const isolateLabel = strings.isolate_label || 'Isolate';
    const showAllLabel = strings.show_all_label || 'Show all';
    const collapseFoldsLabel = strings.collapse_folds_label || 'Collapse folds';
    const mergeFoldsLabel = strings.merge_folds_label || 'Merge folds';

    function formatString(template, values) {
      if (!template) return '';
      return template.replace(/\{(\w+)\}/g, (match, key) => {
        if (!values || !(key in values)) {
          return match;
        }
        return String(values[key]);
      });
    }

    statsPill.textContent = strings.stats_loading || '';

    const typeOrder = ['normal', 'open', 'cond_open'];
    const collapsedData = leaderboardData.experiments || [];
    const rawData = leaderboardData.raw_experiments || leaderboardData.experiments || [];
    let useCollapsedFolds = true;
    let experiments = [];
    let filterConfig = [];
    let filterState = {};

    function normalizeExperiments(source) {
      return (source || []).map((exp) => ({
        ...exp,
        exp_type: exp.exp_type || 'normal',
        env_config: exp.env_config || unknownEnv,
        task_config: exp.task_config || unknownTask,
        network: exp.network || unknownNetwork,
      }));
    }

    function uniqueValuesFrom(items, key) {
      const set = new Set();
      items.forEach((exp) => {
        const value = exp[key];
        if (value !== undefined && value !== null && value !== '') {
          set.add(value);
        }
      });
      return Array.from(set);
    }

    function sortValues(key, values) {
      if (key === 'exp_type') {
        return values.sort((a, b) => {
          const aIndex = typeOrder.indexOf(a);
          const bIndex = typeOrder.indexOf(b);
          if (aIndex === -1 && bIndex === -1) return a.localeCompare(b);
          if (aIndex === -1) return 1;
          if (bIndex === -1) return -1;
          return aIndex - bIndex;
        });
      }
      return values.sort((a, b) => String(a).localeCompare(String(b)));
    }

    function buildFilterConfig(items) {
      return [
        {
          key: 'exp_type',
          label: strings.filter_exp_type_label || 'Experiment type',
          values: sortValues('exp_type', uniqueValuesFrom(items, 'exp_type')),
          display: (value) => typeLabels[value] || value,
        },
        {
          key: 'env_config',
          label: strings.filter_env_label || 'Env config',
          values: sortValues('env_config', uniqueValuesFrom(items, 'env_config')),
        },
        {
          key: 'task_config',
          label: strings.filter_task_label || 'Task config',
          values: sortValues('task_config', uniqueValuesFrom(items, 'task_config')),
        },
        {
          key: 'network',
          label: strings.filter_network_label || 'Traffic network',
          values: sortValues('network', uniqueValuesFrom(items, 'network')),
        },
      ];
    }

    function updateStatsPill() {
      statsPill.textContent = formatString(strings.stats_pill, {
        count: experiments.length,
      });
    }

    function rebuildFilters({ preserveSelections = true } = {}) {
      const previousState = preserveSelections ? filterState : null;
      experiments = normalizeExperiments(useCollapsedFolds ? collapsedData : rawData);
      filterConfig = buildFilterConfig(experiments);
      const nextState = {};
      filterConfig.forEach((cfg) => {
        let selectedValues = cfg.values;
        if (previousState && previousState[cfg.key]) {
          const previousValues = previousState[cfg.key];
          if (previousValues.size === 0) {
            selectedValues = [];
          } else {
            selectedValues = cfg.values.filter((value) => previousValues.has(value));
            if (selectedValues.length === 0) {
              selectedValues = cfg.values;
            }
          }
        }
        nextState[cfg.key] = new Set(selectedValues);
      });
      filterState = nextState;
      renderFilters();
      updateStatsPill();
      updateIsolateButton();
      updateFoldToggleButton();
      renderTable();
    }

    function renderFilters() {
      filtersEl.innerHTML = '';
      filterConfig.forEach((cfg) => {
        const group = document.createElement('div');
        group.className = 'filter-group';

        const header = document.createElement('div');
        header.className = 'filter-header';

        const label = document.createElement('div');
        label.className = 'filter-label';
        label.textContent = cfg.label;

        const actions = document.createElement('div');
        actions.className = 'filter-actions';
        const allBtn = document.createElement('button');
        allBtn.type = 'button';
        allBtn.className = 'filter-action';
        allBtn.textContent = strings.filter_action_all || 'All';
        allBtn.addEventListener('click', () => {
          filterState[cfg.key] = new Set(cfg.values);
          renderFilters();
          renderTable();
        });
        const noneBtn = document.createElement('button');
        noneBtn.type = 'button';
        noneBtn.className = 'filter-action';
        noneBtn.textContent = strings.filter_action_none || 'None';
        noneBtn.addEventListener('click', () => {
          filterState[cfg.key].clear();
          renderFilters();
          renderTable();
        });
        actions.appendChild(allBtn);
        actions.appendChild(noneBtn);

        header.appendChild(label);
        header.appendChild(actions);

        const options = document.createElement('div');
        options.className = 'filter-options';
        cfg.values.forEach((value) => {
          const option = document.createElement('label');
          option.className = 'filter-option';
          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = filterState[cfg.key].has(value);
          checkbox.addEventListener('change', () => {
            if (checkbox.checked) {
              filterState[cfg.key].add(value);
            } else {
              filterState[cfg.key].delete(value);
            }
            renderTable();
          });
          const text = document.createElement('span');
          text.textContent = cfg.display ? cfg.display(value) : value;
          option.appendChild(checkbox);
          option.appendChild(text);
          options.appendChild(option);
        });

        group.appendChild(header);
        group.appendChild(options);
        filtersEl.appendChild(group);
      });
    }

    function baseFilteredExperiments() {
      return experiments.filter((exp) =>
        filterConfig.every((cfg) => filterState[cfg.key].has(exp[cfg.key]))
      );
    }

    function filteredExperiments() {
      const base = baseFilteredExperiments();
      if (!isolateSelected) return base;
      if (!selectedRowIds.size) return [];
      return base.filter((exp) => selectedRowIds.has(exp.exp_id));
    }

    function updateFilterSummary(filtered) {
      comboCountEl.textContent = formatString(strings.filter_summary, {
        shown: filtered.length,
        total: experiments.length,
      });
    }

    function updateIsolateButton() {
      if (!isolateBtn) return;
      isolateBtn.textContent = isolateSelected ? showAllLabel : isolateLabel;
    }

    function updateFoldToggleButton() {
      if (!foldToggleBtn) return;
      foldToggleBtn.textContent = useCollapsedFolds ? collapseFoldsLabel : mergeFoldsLabel;
    }

    if (isolateBtn) {
      isolateBtn.addEventListener('click', () => {
        isolateSelected = !isolateSelected;
        updateIsolateButton();
        renderTable();
      });
    }

    if (foldToggleBtn) {
      foldToggleBtn.addEventListener('click', () => {
        useCollapsedFolds = !useCollapsedFolds;
        isolateSelected = false;
        selectedRowIds.clear();
        updateIsolateButton();
        rebuildFilters({ preserveSelections: true });
      });
    }

    if (deselectBtn) {
      deselectBtn.addEventListener('click', () => {
        selectedRowIds.clear();
        if (isolateSelected) {
          renderTable();
          return;
        }
        const rows = tableContainer.querySelectorAll('tbody tr');
        rows.forEach((row) => row.classList.remove('row-selected'));
      });
    }

    function formattedValue(value) {
      if (value === null || value === undefined || value === '') return naLabel;
      if (typeof value === 'number') return Number.isInteger(value) ? value.toString() : value.toFixed(6).replace(/0+$/, '').replace(/\.$/, '');
      const num = Number(value);
      if (!Number.isNaN(num)) {
        return Number.isInteger(num) ? num.toString() : num.toFixed(6).replace(/0+$/, '').replace(/\.$/, '');
      }
      return value;
    }

    let previewCandidates = [];
    let previewCandidateIndex = 0;

    function previewCandidatesFor(exp) {
      const candidates = [];
      const bases = [];
      if (exp.exp_path) {
        const relativePath = String(exp.exp_path).replace(/^\/+/, '');
        if (isFileProtocol) {
          bases.push(`../${relativePath}`);
          bases.push(relativePath);
        } else {
          bases.push(relativePath);
          bases.push(`../${relativePath}`);
        }
      }
      if (exp.exp_link) bases.push(exp.exp_link);
      bases.forEach((base) => {
        if (!base || !previewPath) return;
        const normalized = String(base).replace(/\/$/, '');
        const rawBase = toRawGitHubUrl(normalized);
        const url = rawBase.replace(/\/$/, '') + '/' + previewPath.replace(/^\/+/, '');
        if (url && !candidates.includes(url)) {
          candidates.push(url);
        }
      });
      return candidates;
    }

    function toRawGitHubUrl(url) {
      if (!/^https?:\/\//i.test(url)) return url;
      if (url.includes('raw.githubusercontent.com')) return url;
      if (!url.includes('github.com')) return url;
      try {
        const parsed = new URL(url);
        const parts = parsed.pathname.split('/').filter(Boolean);
        if (parts.length < 4) return url;
        const [owner, repo, kind, branch, ...rest] = parts;
        if (kind !== 'tree' && kind !== 'blob') return url;
        const rawPath = ['/', owner, repo, branch, ...rest].join('/');
        return `https://raw.githubusercontent.com${rawPath}`;
      } catch (err) {
        return url;
      }
    }

    function showPreview(expId, candidates, evt) {
      previewCandidates = candidates || [];
      previewCandidateIndex = 0;
      if (!previewCandidates.length) {
        hidePreview();
        return;
      }
      previewTitle.textContent = formatString(strings.preview_title_template, {
        expId,
        imagePath: previewPath,
      });
      previewCard.classList.remove('missing');
      previewImg.src = previewCandidates[0];
      previewImg.alt = formatString(strings.preview_alt_template, { expId });
      previewCard.classList.add('visible');
      positionPreview(evt);
    }

    function hidePreview() {
      previewCard.classList.remove('visible');
    }

    function positionPreview(evt) {
      const padding = 16;
      const { innerWidth, innerHeight } = window;
      const rect = previewCard.getBoundingClientRect();
      let left = evt.clientX + padding;
      let top = evt.clientY + padding;
      if (left + rect.width > innerWidth) {
        left = evt.clientX - rect.width - padding;
      }
      if (top + rect.height > innerHeight) {
        top = evt.clientY - rect.height - padding;
      }
      previewCard.style.left = `${Math.max(padding, left)}px`;
      previewCard.style.top = `${Math.max(padding, top)}px`;
    }

    function showMetricTooltip(text, evt) {
      metricTooltip.innerHTML = text;
      metricTooltip.classList.add('visible');
      positionMetricTooltip(evt);
      if (window.MathJax && window.MathJax.typesetPromise) {
        MathJax.typesetPromise([metricTooltip]);
      }
    }

    function hideMetricTooltip() {
      metricTooltip.classList.remove('visible');
    }

    function positionMetricTooltip(evt) {
      const padding = 14;
      const { innerWidth, innerHeight } = window;
      const rect = metricTooltip.getBoundingClientRect();
      let left = evt.clientX + padding;
      let top = evt.clientY + padding;
      if (left + rect.width > innerWidth) {
        left = evt.clientX - rect.width - padding;
      }
      if (top + rect.height > innerHeight) {
        top = evt.clientY - rect.height - padding;
      }
      metricTooltip.style.left = `${Math.max(padding, left)}px`;
      metricTooltip.style.top = `${Math.max(padding, top)}px`;
    }

    previewImg.addEventListener('error', () => {
      if (previewCandidateIndex + 1 < previewCandidates.length) {
        previewCandidateIndex += 1;
        previewImg.src = previewCandidates[previewCandidateIndex];
        return;
      }
      previewCard.classList.add('missing');
    });
    previewImg.addEventListener('load', () => {
      previewCard.classList.remove('missing');
    });

    let selectedExperiments = [];
    let selectedRowIds = new Set();
    let isolateSelected = false;

    function updateCompareSlider(value) {
      const percent = Number(value);
      compareFrame.style.setProperty('--compare-position', `${percent}%`);
    }

    function loadCompareImage(imgEl, candidates) {
      let index = 0;
      imgEl.removeAttribute('src');
      if (!candidates || !candidates.length) {
        return;
      }
      const loadAt = (idx) => {
        imgEl.src = candidates[idx];
      };
      imgEl.onerror = () => {
        index += 1;
        if (index < candidates.length) {
          loadAt(index);
        }
      };
      loadAt(index);
    }

    function updateComparePanel() {
      if (selectedExperiments.length === 0) {
        comparePanel.classList.remove('visible', 'single', 'dual');
        comparePanel.setAttribute('aria-hidden', 'true');
        return;
      }

      const leftExp = selectedExperiments[0];
      const rightExp = selectedExperiments[1];
      compareLeftLabel.textContent = formatString(compareLabelLeftTemplate, { expId: leftExp.exp_id });
      const leftCandidates = previewCandidatesFor(leftExp);
      loadCompareImage(compareImgLeft, leftCandidates);
      compareImgLeft.alt = formatString(strings.preview_alt_template, { expId: leftExp.exp_id });

      if (selectedExperiments.length === 1) {
        comparePanel.classList.add('visible', 'single');
        comparePanel.classList.remove('dual');
        compareRightLabel.textContent = '';
        comparePanel.setAttribute('aria-hidden', 'false');
        return;
      }

      comparePanel.classList.remove('single');
      comparePanel.classList.add('visible', 'dual');
      compareRightLabel.textContent = formatString(compareLabelRightTemplate, { expId: rightExp.exp_id });
      const rightCandidates = previewCandidatesFor(rightExp);
      loadCompareImage(compareImgRight, rightCandidates);
      compareImgRight.alt = formatString(strings.preview_alt_template, { expId: rightExp.exp_id });

      compareSlider.value = 50;
      updateCompareSlider(50);
      comparePanel.setAttribute('aria-hidden', 'false');
    }

    function clearComparison() {
      selectedExperiments = [];
      updateComparePanel();
    }

    compareSlider.addEventListener('input', (evt) => updateCompareSlider(evt.target.value));

    function renderTable() {
      tableContainer.innerHTML = '';
      clearComparison();
      const experiments = filteredExperiments();
      updateFilterSummary(experiments);
      if (!experiments.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = strings.filter_empty || strings.empty_no_experiments || '';
        tableContainer.appendChild(empty);
        return;
      }

      function uniqueValuesFrom(items, key) {
        const set = new Set();
        items.forEach((exp) => {
          const value = exp[key];
          if (value !== undefined && value !== null && value !== '') {
            set.add(value);
          }
        });
        return Array.from(set);
      }

      function buildExtraColumns(items) {
        const candidates = [
          {
            key: 'exp_type',
            label: strings.filter_exp_type_label || 'Experiment type',
            format: (value) => typeLabels[value] || value,
          },
          { key: 'env_config', label: strings.filter_env_label || 'Env config' },
          { key: 'task_config', label: strings.filter_task_label || 'Task config' },
          { key: 'network', label: strings.filter_network_label || 'Traffic network' },
        ];
        return candidates.filter((cfg) => uniqueValuesFrom(items, cfg.key).length > 1);
      }

      function metricPreference(metricKey) {
        const key = String(metricKey || '').toLowerCase();
        const description = (metricDescriptions[metricKey] || '').toLowerCase();
        const overrides = {
          diff_sumo_routerl: 'max',
          dynamic_recovery: 'max',
          avg_speed_pre: 'max',
          avg_speed_test: 'max',
          avg_mileage_pre: 'min',
          avg_mileage_test: 'min',
        };
        if (overrides[key]) return overrides[key];
        if (description.includes('favors') || description.includes('ratio')) return 'max';
        if (key.includes('ratio') || key.includes('advantage') || key.includes('winrate')) return 'max';
        if (key.includes('speed') || description.includes('avg speed')) return 'max';
        if (key.includes('recovery')) return 'max';
        if (description.includes('std dev') || description.includes('volatility')) return 'min';
        if (description.includes('instability') || description.includes('time lost')) return 'min';
        if (description.includes('switch') || key.includes('switch')) return 'min';
        if (description.includes('cost') || description.includes('loss') || key.includes('cost') || key.includes('loss')) return 'min';
        if (key.startsWith('t_') || key.includes('time')) return 'min';
        if (key.includes('mileage')) return 'min';
        return 'max';
      }

      function computeBestMetrics(items, metrics) {
        const best = {};
        const directions = {};
        metrics.forEach((metric) => {
          directions[metric] = metricPreference(metric);
        });
        items.forEach((exp) => {
          metrics.forEach((metric) => {
            const raw = exp.metrics?.[metric];
            const value = Number(raw);
            if (raw === null || raw === undefined || raw === '' || Number.isNaN(value)) {
              return;
            }
            if (!(metric in best)) {
              best[metric] = value;
              return;
            }
            if (directions[metric] === 'min') {
              if (value < best[metric]) best[metric] = value;
            } else if (value > best[metric]) {
              best[metric] = value;
            }
          });
        });
        return { best, directions };
      }

      const metricCols = [];
      const seen = new Set();
      experiments.forEach((exp) => {
        const ordered = exp.metric_order || Object.keys(exp.metrics || {});
        ordered.forEach((m) => {
          if (!seen.has(m)) {
            seen.add(m);
            metricCols.push(m);
          }
        });
        Object.keys(exp.metrics || {}).forEach((m) => {
          if (!seen.has(m)) {
            seen.add(m);
            metricCols.push(m);
          }
        });
      });

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      const compareHeader = document.createElement('th');
      compareHeader.textContent = compareColumnLabel;
      compareHeader.dataset.key = 'compare';
      compareHeader.dataset.label = compareColumnLabel;
      compareHeader.dataset.skipCsv = 'true';
      compareHeader.className = 'compare-header-cell';
      headerRow.appendChild(compareHeader);
      const extraColumns = buildExtraColumns(experiments);
      const baseHeaders = [
        { key: 'exp_id', label: headerLabels.exp_id },
        { key: 'algorithm', label: headerLabels.algorithm },
        { key: 'script', label: headerLabels.script },
        { key: 'alg_config', label: headerLabels.alg_config },
        { key: 'env_seed', label: headerLabels.env_seed },
        { key: 'torch_seed', label: headerLabels.torch_seed },
      ];

      const sortState = { column: null, direction: 'desc' };

      function headerCell({ key, label, description }) {
        const th = document.createElement('th');
        th.textContent = label || '';
        th.dataset.key = key;
        th.dataset.label = label || '';
        if (description) {
          th.classList.add('metric-header');
          th.addEventListener('mouseenter', (evt) => showMetricTooltip(description, evt));
          th.addEventListener('mousemove', positionMetricTooltip);
          th.addEventListener('mouseleave', hideMetricTooltip);
        }
        th.onclick = () => applySort(key);
        th.appendChild(document.createElement('span')).className = 'sort-indicator';
        return th;
      }

      if (baseHeaders.length) {
        headerRow.appendChild(headerCell(baseHeaders[0]));
      }
      extraColumns.forEach((col) =>
        headerRow.appendChild(headerCell({ key: col.key, label: col.label }))
      );
      baseHeaders.slice(1).forEach((h) => headerRow.appendChild(headerCell(h)));
      metricCols.forEach((m) =>
        headerRow.appendChild(
          headerCell({ key: m, label: m, description: metricDescriptions[m] })
        )
      );
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      const { best: bestMetrics, directions: metricDirections } = computeBestMetrics(
        experiments,
        metricCols
      );
      experiments.forEach((exp) => {
        const tr = document.createElement('tr');
        const compareTd = document.createElement('td');
        compareTd.dataset.value = '';
        compareTd.dataset.skipCsv = 'true';
        const compareCheckbox = document.createElement('input');
        compareCheckbox.type = 'checkbox';
        compareCheckbox.className = 'compare-checkbox';
        compareCheckbox.addEventListener('change', (evt) => {
          evt.stopPropagation();
          if (compareCheckbox.checked) {
            if (selectedExperiments.length >= 2) {
              compareCheckbox.checked = false;
              return;
            }
            if (!selectedExperiments.find((item) => item.exp_id === exp.exp_id)) {
              selectedExperiments.push(exp);
            }
          } else {
            selectedExperiments = selectedExperiments.filter((item) => item.exp_id !== exp.exp_id);
          }
          updateComparePanel();
        });
        compareCheckbox.addEventListener('click', (evt) => {
          evt.stopPropagation();
        });
        compareTd.appendChild(compareCheckbox);
        tr.appendChild(compareTd);
        const expId = exp.exp_id || naLabel;
        const expLink = exp.exp_link || exp.exp_path || '#';
        const expTd = document.createElement('td');
        expTd.dataset.value = expId;
        const expWrap = document.createElement('span');
        expWrap.className = 'exp-cell';
        const expAnchor = document.createElement('a');
        expAnchor.href = expLink;
        expAnchor.target = '_blank';
        expAnchor.rel = 'noopener';
        expAnchor.textContent = expId;
        expWrap.appendChild(expAnchor);
        if (exp.fold_count && exp.fold_count > 1) {
          const star = document.createElement('span');
          star.className = 'fold-star';
          star.title = formatString(strings.folds_tooltip, { folds: exp.fold_count });
          star.textContent = 'avg';
          expWrap.appendChild(star);
        }
        const previewList = previewCandidatesFor(exp);
        expWrap.addEventListener('mouseenter', (evt) => showPreview(expId, previewList, evt));
        expWrap.addEventListener('mousemove', positionPreview);
        expWrap.addEventListener('mouseleave', hidePreview);
        expTd.appendChild(expWrap);
        tr.appendChild(expTd);
        const expRowId = exp.exp_id || '';
        tr.dataset.expId = expRowId;
        if (selectedRowIds.has(expRowId)) {
          tr.classList.add('row-selected');
        }
        tr.addEventListener('click', () => {
          if (selectedRowIds.has(expRowId)) {
            selectedRowIds.delete(expRowId);
            tr.classList.remove('row-selected');
          } else {
            selectedRowIds.add(expRowId);
            tr.classList.add('row-selected');
          }
          if (isolateSelected) {
            renderTable();
          }
        });
        extraColumns.forEach((col) => {
          const td = document.createElement('td');
          const rawValue = exp[col.key];
          const value = rawValue === null || rawValue === undefined || rawValue === ''
            ? naLabel
            : rawValue;
          const display = col.format ? col.format(value) : value;
          td.textContent = display;
          td.dataset.value = rawValue ?? '';
          tr.appendChild(td);
        });
        const cells = [
          exp.algorithm || naLabel,
          exp.script || naLabel,
          exp.alg_config || naLabel,
          exp.env_seed ?? naLabel,
          exp.torch_seed ?? naLabel,
        ];
        cells.forEach((val) => {
          const td = document.createElement('td');
          td.innerHTML = val === null || val === undefined ? naLabel : val;
          tr.appendChild(td);
        });
        metricCols.forEach((metric) => {
          const td = document.createElement('td');
          const raw = exp.metrics?.[metric];
          const value = Number(raw);
          td.textContent = formattedValue(raw);
          td.dataset.value = raw ?? '';
          const bestValue = bestMetrics[metric];
          if (
            bestValue !== undefined &&
            raw !== null &&
            raw !== undefined &&
            raw !== '' &&
            !Number.isNaN(value)
          ) {
            const epsilon = 1e-9 * Math.max(1, Math.abs(bestValue));
            if (Math.abs(value - bestValue) <= epsilon) {
              td.classList.add('metric-best');
              td.dataset.best = metricDirections[metric] || '';
            }
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      const wrap = document.createElement('div');
      wrap.className = 'table-wrap';
      wrap.appendChild(table);
      tableContainer.appendChild(wrap);

      function applySort(colKey, directionOverride) {
        if (directionOverride) {
          sortState.column = colKey;
          sortState.direction = directionOverride;
        } else if (sortState.column === colKey) {
          sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
        } else {
          sortState.column = colKey;
          sortState.direction = colKey === 'exp_id' ? 'asc' : 'desc';
        }

        const colIndex = [...headerRow.children].findIndex((th) => th.dataset.key === colKey);
        if (colIndex < 0) return;
        const rows = [...tbody.querySelectorAll('tr')];
        rows.sort((a, b) => {
          const av = a.children[colIndex].dataset.value ?? a.children[colIndex].textContent;
          const bv = b.children[colIndex].dataset.value ?? b.children[colIndex].textContent;
          const anum = Number(av);
          const bnum = Number(bv);
          if (!Number.isNaN(anum) && !Number.isNaN(bnum)) {
            return sortState.direction === 'asc' ? anum - bnum : bnum - anum;
          }
          return sortState.direction === 'asc'
            ? String(av).localeCompare(String(bv))
            : String(bv).localeCompare(String(av));
        });
        tbody.innerHTML = '';
        rows.forEach((r) => tbody.appendChild(r));

        headerRow.querySelectorAll('.sort-indicator').forEach((el) => {
          el.textContent = '';
        });
        const th = headerRow.children[colIndex];
        const indicator = th.querySelector('.sort-indicator');
        indicator.textContent = sortState.direction === 'asc'
          ? (strings.sort_indicator_asc || '')
          : (strings.sort_indicator_desc || '');
      }

      if (metricCols.includes('t_CAV')) {
        applySort('t_CAV', 'asc');
      }
    }

    rebuildFilters({ preserveSelections: false });

    function sanitizeSlug(value) {
      const seed = value || strings.slug_default || '';
      return String(seed)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '_')
        .replace(/^_+|_+$/g, '');
    }

    function filterSlugPart(cfg) {
      const selected = cfg.values.filter((value) => filterState[cfg.key].has(value));
      if (!selected.length) {
        return `${cfg.key}_${strings.slug_default || 'none'}`;
      }
      if (selected.length === cfg.values.length) {
        return `${cfg.key}_${strings.slug_all || 'all'}`;
      }
      return `${cfg.key}_${selected.join('-')}`;
    }

    function buildFilterSlug() {
      return sanitizeSlug(filterConfig.map(filterSlugPart).join('_'));
    }

    function csvEscape(value) {
      const text = String(value ?? '');
      const escaped = text.replace(/"/g, '""');
      return /[",\n]/.test(escaped) ? `"${escaped}"` : escaped;
    }

    function cellValue(cell) {
      if (!cell) return '';
      const raw = cell.dataset.value ?? cell.textContent ?? '';
      return String(raw).trim();
    }

    function downloadCsv() {
      const table = tableContainer.querySelector('table');
      if (!table) return;

      const rows = [];
      const headerCells = [...table.querySelectorAll('thead th')].filter(
        (th) => th.dataset.skipCsv !== 'true'
      );
      rows.push(
        headerCells
          .map((th) => csvEscape(th.dataset.label || th.textContent || ''))
          .join(',')
      );

      const bodyRows = [...table.querySelectorAll('tbody tr')];
      bodyRows.forEach((row) => {
        const values = [...row.children]
          .filter((cell) => cell.dataset.skipCsv !== 'true')
          .map((cell) => csvEscape(cellValue(cell)));
        rows.push(values.join(','));
      });

      const slug = buildFilterSlug();
      const filename = formatString(strings.csv_filename, { slug });
      const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    downloadBtn.addEventListener('click', downloadCsv);
  </script>
</body>
