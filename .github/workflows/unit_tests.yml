name: Unit tests

on:
  push:
    branches:
      - '**'
    paths:
      - "algorithms/**"
      - "analysis/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/unit_tests.yml"
  pull_request:
    branches:
      - '**'
    paths:
      - "algorithms/**"
      - "analysis/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/unit_tests.yml"
  workflow_dispatch:

jobs:
  core-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run unit tests
        run: python -m pytest -rs tests/test_iql.py tests/test_ippo.py tests/test_mappo.py tests/test_pimac_v0.py tests/test_pimac_v1.py tests/test_pimac_v2.py tests/test_pimac_v3.py tests/test_qmix.py tests/test_vdn.py tests/test_metrics.py
