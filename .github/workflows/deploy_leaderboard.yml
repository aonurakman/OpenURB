name: Deploy Leaderboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "results/**"
      - "!results/sample_results/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate leaderboard site
        run: |
          python3 leaderboard/generate_leaderboard.py \
            --results-dir results \
            --output-dir leaderboard_site \
            --repo-url "https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: leaderboard_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
